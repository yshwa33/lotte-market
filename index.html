<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="롯데호텔 구매팀 시장동향 대시보드">
  <title>LOTTE Hotel · Procurement Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --lotte-red: #DA291C;
      --lotte-grey: #54585A;
      --lotte-gold: #877669;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .cover {
      position: relative;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: #fff;
      text-align: center;
    }

    .cover-bg {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.35) 0%,
          rgba(0, 0, 0, 0.55) 45%,
          rgba(0, 0, 0, 0.72) 100%
        ),
        url('https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
      transform: scale(1.03);
      animation: slowZoom 20s ease-in-out infinite alternate;
    }

    @keyframes slowZoom {
      from { transform: scale(1.03); }
      to { transform: scale(1.08); }
    }

    .cover-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1.5rem 3rem;
      width: 100%;
      max-width: 52rem;
    }

    .cover-logo {
      width: clamp(48px, 6.5vw, 56px);
      height: clamp(48px, 6.5vw, 56px);
      margin-bottom: 1.5rem;
      filter: drop-shadow(0 2px 12px rgba(0, 0, 0, 0.35));
      image-rendering: -webkit-optimize-contrast;
    }

    .cover-tagline {
      font-size: clamp(0.75rem, 2vw, 0.875rem);
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.85);
      margin-bottom: 1.75rem;
    }

    .cover-tagline .highlight {
      display: inline-block;
      background: var(--lotte-red);
      color: #fff;
      padding: 0.15rem 0.55rem;
      margin: 0 0.15rem;
      font-weight: 600;
      letter-spacing: 0.12em;
    }

    .cover-headline {
      font-size: clamp(1.75rem, 5.5vw, 3rem);
      font-weight: 300;
      line-height: 1.45;
      letter-spacing: -0.02em;
      margin-bottom: 1.25rem;
      text-shadow: 0 2px 32px rgba(0, 0, 0, 0.4);
    }

    .cover-headline strong {
      font-weight: 700;
    }

    .cover-brand {
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      font-weight: 700;
      letter-spacing: 0.35em;
      margin-bottom: 0.5rem;
      text-indent: 0.35em;
    }

    .cover-sub {
      font-size: clamp(0.8125rem, 2vw, 0.9375rem);
      font-weight: 400;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 0.08em;
      margin-bottom: 3.5rem;
    }

    .cover-actions {
      display: flex;
      justify-content: center;
      gap: 2.5rem;
      flex-wrap: wrap;
    }

    .access-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      text-decoration: none;
      color: #fff;
      transition: transform 0.25s ease;
    }

    .access-btn:hover {
      transform: translateY(-4px);
    }

    .access-btn:focus-visible {
      outline: 2px solid #fff;
      outline-offset: 6px;
      border-radius: 4px;
    }

    .access-icon {
      width: clamp(88px, 14vw, 110px);
      height: clamp(88px, 14vw, 110px);
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 28% 72% 65% 35% / 35% 38% 62% 65%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.25s, border-color 0.25s, box-shadow 0.25s;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .access-btn:hover .access-icon {
      background: rgba(218, 41, 28, 0.75);
      border-color: rgba(255, 255, 255, 0.45);
      box-shadow: 0 12px 40px rgba(218, 41, 28, 0.35);
    }

    .access-icon svg {
      width: 40%;
      height: 40%;
      fill: none;
      stroke: #fff;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .access-label {
      font-size: 0.8125rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .cover-footer {
      position: absolute;
      bottom: 1.25rem;
      left: 0;
      right: 0;
      z-index: 1;
      font-size: 0.6875rem;
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: 0.06em;
    }

    .cover-lang {
      position: absolute;
      top: 1.5rem;
      right: 2rem;
      z-index: 2;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: rgba(255, 255, 255, 0.8);
      border-bottom: 1px solid rgba(255, 255, 255, 0.6);
      padding-bottom: 2px;
    }

    @media (max-width: 600px) {
      .cover-lang { right: 1.25rem; top: 1rem; }
      .cover-sub { margin-bottom: 2.5rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .cover-bg { animation: none; }
      .access-btn { transition: none; }
    }
  </style>
</head>
